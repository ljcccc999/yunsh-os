# YUNSH OS - SSH Server Hardening
# Dropped into /etc/ssh/sshd_config.d/ (takes precedence over sshd_config)
#
# Note: PasswordAuthentication is kept enabled to allow
# first-time login with the default user (yunsh).

Port 22
Protocol 2
MaxAuthTries 3
ClientAliveInterval 120
ClientAliveCountMax 3
PermitRootLogin prohibit-password
PasswordAuthentication yes
X11Forwarding no
