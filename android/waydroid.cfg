# YUNSH OS v1.0 - Waydroid Configuration
# Android container setup for App Store and APK support

[waydroid]
# Display settings
width = 1920
height = 1080
dpi = 320

# Use software rendering for compatibility
renderer = gl
# Single display mode
multi_display = false

# Network
network = true
dns = 8.8.8.8, 114.114.114.114

# Storage for apps
images_path = /var/lib/waydroid/images
rootfs_overlay = /var/lib/waydroid/rootfs

[properties]
# Enable Android desktop mode
persist.waydroid.multi_windows = true
persist.waydroid.wide_color = false
sys.waydroid.running = 1

# System properties
ro.product.brand = YUNSH
ro.product.manufacturer = YUNSH
ro.product.model = YUNSH V1
ro.product.device = yunsh_v1
ro.build.version.release = 11
ro.build.version.sdk = 30

[init]
# Startup commands
cmds = [
    "setprop persist.sys.timezone Asia/Shanghai",
    "setprop ro.sf.lockscreen_rot 0",
    "setprop ro.sf.hwrotation 0",
]

[apps]
# Pre-installed apps to auto-install
pre_install = [
    "/usr/share/yunsh/apps/com.tencent.android.qqdownloader.apk",
]

# Session auto-start
auto_start_session = true
session_timeout = 30

[permissions]
storage = true
notifications = true
overlay = true

[security]
# Allow APK installation from file manager
allow_unknown_sources = true
verify_apps = false
