<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#00D4FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bluetooth "B" rune with glow effect -->
  <defs>
    <linearGradient id="btGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088CC;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main Bluetooth symbol -->
  <polyline points="7.5 5.5 16.5 17.5 12 22 12 2 16.5 6.5 7.5 17.5" stroke="url(#btGrad)" fill="none"/>
  <!-- Glow dot -->
  <circle cx="12" cy="12" r="1.5" fill="rgba(0,212,255,0.15)" stroke="none"/>
</svg>
